<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSBG Schedule | 4th Year BS Computer Science</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --void:#07040d;
  --panel:#120a22;
  --panel-2:#180f2c;
  --line:#2c1e4a;
  --violet:#9b3bff;
  --violet-glow:#b968ff;
  --magenta:#e935c1;
  --text:#ece6f7;
  --muted:#8f80ac;
  --muted-2:#6a5c8a;
  --cut:14px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow-x:hidden;}

body{
  background:var(--void);
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* ---------- animated background ---------- */
#bgcanvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  display:block;
}

.bg-glow{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 700px 500px at 12% -5%, rgba(155,59,255,0.18), transparent 60%),
    radial-gradient(ellipse 600px 500px at 100% 30%, rgba(233,53,193,0.12), transparent 60%),
    radial-gradient(ellipse 800px 600px at 50% 110%, rgba(155,59,255,0.15), transparent 60%);
}

.scanline{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.015) 0px,
    rgba(255,255,255,0.015) 1px,
    transparent 1px,
    transparent 3px
  );
  mix-blend-mode:overlay;
}

.vignette{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  box-shadow:inset 0 0 180px 40px rgba(0,0,0,0.65);
}

/* ---------- layout shell ---------- */
.wrap{
  position:relative;
  z-index:2;
  width:100%;
  max-width:980px;
  margin:0 auto;
  padding:clamp(16px,4vw,28px) clamp(12px,4vw,20px) 80px;
}

.terminal{
  background:linear-gradient(180deg, var(--panel), var(--panel-2));
  border:1px solid var(--line);
  clip-path:polygon(
    0 var(--cut), var(--cut) 0,
    calc(100% - var(--cut)) 0, 100% var(--cut),
    100% calc(100% - var(--cut)), calc(100% - var(--cut)) 100%,
    var(--cut) 100%, 0 calc(100% - var(--cut))
  );
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(155,59,255,0.05), 0 30px 60px -20px rgba(0,0,0,0.7), 0 0 60px -20px rgba(155,59,255,0.28);
  position:relative;
}

/* ---------- unified GX animated pattern ---------- */
.terminal::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.17;
  background:
    repeating-linear-gradient(
      118deg,
      transparent 0 38px,
      rgba(185,104,255,.16) 38px 39px,
      transparent 39px 78px
    ),
    repeating-linear-gradient(
      28deg,
      transparent 0 74px,
      rgba(233,53,193,.10) 74px 75px,
      transparent 75px 148px
    );
  background-size:220px 220px, 320px 320px;
  animation:gxPatternDrift 18s linear infinite;
}

.terminal::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:linear-gradient(
    110deg,
    transparent 0%,
    rgba(185,104,255,.035) 42%,
    rgba(233,53,193,.055) 50%,
    transparent 58%
  );
  transform:translateX(-120%);
  animation:gxWideSweep 9s ease-in-out infinite;
}

.term-chrome,.hero,.panel,.term-footer{position:relative;z-index:2;}

@keyframes gxPatternDrift{
  from{background-position:0 0,0 0;}
  to{background-position:220px 110px,-160px 160px;}
}
@keyframes gxWideSweep{
  0%,55%{transform:translateX(-120%);opacity:0;}
  65%{opacity:1;}
  100%{transform:translateX(120%);opacity:0;}
}

/* angular corner brackets (HUD style, all 4 corners) */
.corner-bracket{
  position:absolute;
  width:26px;
  height:26px;
  z-index:5;
  pointer-events:none;
}
.corner-bracket svg{width:100%;height:100%;display:block;}
.corner-bracket.tl{top:8px;left:8px;}
.corner-bracket.tr{top:8px;right:8px;transform:scaleX(-1);}
.corner-bracket.bl{bottom:8px;left:8px;transform:scaleY(-1);}
.corner-bracket.br{bottom:8px;right:8px;transform:scale(-1,-1);}

/* thin ruler tick strip along top edge */
.tick-strip{
  position:absolute;
  top:0;left:0;right:0;
  height:5px;
  z-index:4;
  background-image:repeating-linear-gradient(
    90deg,
    rgba(185,104,255,0.55) 0px, rgba(185,104,255,0.55) 1px,
    transparent 1px, transparent 12px
  );
  opacity:.55;
}

.term-chrome{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  padding:12px 16px;
  background:rgba(0,0,0,0.3);
  border-bottom:1px solid var(--line);
  min-width:0;
  position:relative;
}
.term-dot{width:9px;height:9px;border-radius:50%;opacity:.85;flex:none;}
.term-dot.r{background:#ff5f56;}
.term-dot.y{background:#ffbd2e;}
.term-dot.g{background:#27c93f;}

.brand-mark{
  display:flex;
  align-items:center;
  gap:8px;
  margin-left:4px;
}
.frame-icon{
  width:16px;
  height:16px;
  flex:none;
  color:var(--violet-glow);
}

.term-id{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  letter-spacing:.14em;
  color:var(--muted);
}

.term-status{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:7px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:.14em;
  color:var(--muted);
  text-transform:uppercase;
}
.pulse-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--violet-glow);
  box-shadow:0 0 8px 2px rgba(185,104,255,0.7);
  animation:pulseDot 1.8s ease-in-out infinite;
  flex:none;
}
@keyframes pulseDot{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(.75);}
}

@media (max-width:640px){
  .winstack{display:none;}
}
@media (max-width:520px){
  .term-id{display:none;}
  .brandmark .label{display:none;}
}
@media (max-width:420px){
  .term-status{display:none;}
}

/* brand mark box (top-left, like a logo chip) */
.brandmark{
  display:flex;
  align-items:center;
  gap:8px;
  padding:5px 10px 5px 6px;
  border:1px solid rgba(155,59,255,0.45);
  background:rgba(155,59,255,0.07);
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
}
.brandmark .mark{
  position:relative;
  width:20px;height:20px;
  border:1.5px solid var(--violet-glow);
  flex:none;
}
.brandmark .mark::before,
.brandmark .mark::after{
  content:"";
  position:absolute;
  width:5px;height:5px;
  border:1.5px solid var(--magenta);
}
.brandmark .mark::before{top:-3px;left:-3px;border-right:none;border-bottom:none;}
.brandmark .mark::after{bottom:-3px;right:-3px;border-left:none;border-top:none;}
.brandmark .mark span{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Chakra Petch',sans-serif;
  font-size:8px;font-weight:700;
  color:var(--violet-glow);
}
.brandmark .label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:.16em;
  line-height:1.2;
  color:var(--muted);
  text-transform:uppercase;
}
.brandmark .label b{display:block;color:var(--text);font-size:11px;letter-spacing:.1em;}

/* stacked window icon (top-right accent, mirrors reference UI chip) */
.winstack{
  margin-left:14px;
  display:flex;
  gap:3px;
  flex:none;
}
.winstack span{
  width:9px;height:9px;
  border:1.3px solid var(--muted-2);
}
.winstack span:first-child{border-color:var(--violet-glow);}

/* ---------- trace line overlay (circuit lines with node dots, spans full width) ---------- */
.trace-overlay{
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}
.trace-overlay svg{
  position:absolute;
  width:100%;
  height:100%;
}

/* ---------- tech decorative accents ---------- */
.tech-decor{
  position:absolute;
  inset:0;
  z-index:-1;
  overflow:hidden;
  pointer-events:none;
}

.circuit{
  position:absolute;
  width:180px;
  height:140px;
  color:var(--violet-glow);
  opacity:.32;
}
.circuit-tl{top:10px;left:10px;}
.circuit-br{bottom:10px;right:10px;color:var(--magenta);}

.dotgrid{
  position:absolute;
  width:80px;
  height:80px;
  background-image:radial-gradient(rgba(185,104,255,0.55) 1.4px, transparent 1.4px);
  background-size:11px 11px;
  opacity:.42;
}
.dotgrid-tr{top:16px;right:20px;
  -webkit-mask-image:linear-gradient(225deg, #000 40%, transparent 85%);
  mask-image:linear-gradient(225deg, #000 40%, transparent 85%);
}
.dotgrid-bl{bottom:16px;left:20px;
  background-image:radial-gradient(rgba(233,53,193,0.55) 1.4px, transparent 1.4px);
  -webkit-mask-image:linear-gradient(45deg, #000 40%, transparent 85%);
  mask-image:linear-gradient(45deg, #000 40%, transparent 85%);
}
.dotgrid-midl{
  top:38%;left:6%;
  width:46px;height:46px;
  opacity:.28;
  -webkit-mask-image:radial-gradient(circle, #000 30%, transparent 75%);
  mask-image:radial-gradient(circle, #000 30%, transparent 75%);
}
.dotgrid-midr{
  bottom:32%;right:8%;
  width:46px;height:46px;
  opacity:.28;
  background-image:radial-gradient(rgba(233,53,193,0.55) 1.4px, transparent 1.4px);
  -webkit-mask-image:radial-gradient(circle, #000 30%, transparent 75%);
  mask-image:radial-gradient(circle, #000 30%, transparent 75%);
}

.chevrons{
  position:absolute;
  color:var(--violet-glow);
  opacity:.5;
  display:flex;
  gap:3px;
}
.chevrons svg{width:9px;height:14px;display:block;}
.chevrons-l{top:22%;left:16px;}
.chevrons-r{bottom:18%;right:16px;color:var(--magenta);}

/* faint hex schematic behind the title */
.hex-schematic{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(560px,90%);
  height:260px;
  opacity:.16;
  z-index:0;
  pointer-events:none;
}

@media (max-width:640px){
  .circuit{width:120px;height:95px;opacity:.22;}
  .dotgrid{width:56px;height:56px;}
  .chevrons{display:none;}
}

/* ---------- panel-level tech decor (extends the pattern into the schedule body) ---------- */
.panel-decor{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}
.panel-decor .dotgrid{width:52px;height:52px;opacity:.24;}
.panel-decor .dotgrid.pd-tr{top:10px;right:12px;
  -webkit-mask-image:linear-gradient(225deg,#000 35%,transparent 80%);
  mask-image:linear-gradient(225deg,#000 35%,transparent 80%);
}
.panel-decor .dotgrid.pd-bl{bottom:10px;left:12px;
  background-image:radial-gradient(rgba(233,53,193,0.5) 1.3px, transparent 1.3px);
  -webkit-mask-image:linear-gradient(45deg,#000 35%,transparent 80%);
  mask-image:linear-gradient(45deg,#000 35%,transparent 80%);
}
.panel-decor .pd-corner{
  position:absolute;
  width:34px;height:34px;
  opacity:.4;
}
.panel-decor .pd-corner.pc-tr{top:6px;right:6px;color:var(--violet-glow);}
.panel-decor .pd-corner.pc-bl{bottom:6px;left:6px;color:var(--magenta);transform:rotate(180deg);}
[data-tab-panel="tth"] .panel-decor .pd-corner.pc-tr{color:var(--magenta);}
[data-tab-panel="tth"] .panel-decor .pd-corner.pc-bl{color:var(--violet-glow);}
.panel > .rows, .panel > .daylabel{position:relative;z-index:1;}

@media (max-width:640px){
  .panel-decor .dotgrid{width:36px;height:36px;}
  .panel-decor .pd-corner{width:24px;height:24px;}
}

/* ---------- octagonal frame accent (mirrors the cut-corner image frame + outgoing connector line) ---------- */
.frame-accent{
  position:relative;
  display:inline-block;
  margin-top:18px;
  padding:14px 26px;
  border:1px solid rgba(155,59,255,0.4);
  clip-path:polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
  background:rgba(155,59,255,0.05);
  animation:frameBreathe 4s ease-in-out infinite;
}
@keyframes frameBreathe{
  0%,100%{box-shadow:0 0 0 rgba(155,59,255,0);}
  50%{box-shadow:0 0 24px rgba(155,59,255,.16);}
}
.frame-accent::before{
  content:"";
  position:absolute;
  top:-1px;left:16px;
  width:22px;height:1px;
  background:var(--violet-glow);
}
.frame-accent::after{
  content:"";
  position:absolute;
  bottom:-1px;right:16px;
  width:22px;height:1px;
  background:var(--magenta);
}
.frame-wire{
  position:absolute;
  top:50%;
  right:-1px;
  transform:translate(100%,-50%);
  display:flex;
  align-items:center;
  gap:0;
  pointer-events:none;
}
.frame-wire .wline{width:34px;height:1px;background:linear-gradient(90deg, var(--magenta), transparent);}
.frame-wire .wdot{width:5px;height:5px;border-radius:50%;background:var(--magenta);box-shadow:0 0 6px 1px rgba(233,53,193,0.7);margin-left:-1px;}
@media (max-width:640px){ .frame-wire{display:none;} }

/* ---------- outlined pill CTA (mirrors reference's rounded outline button) ---------- */
.pill-cta{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:14px;
  padding:9px 20px;
  border:1px solid rgba(185,104,255,0.55);
  border-radius:100px;
  background:transparent;
  color:var(--violet-glow);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .2s ease, color .2s ease;
}
.pill-cta:hover{background:rgba(185,104,255,0.12);color:#fff;}
.pill-cta svg{width:12px;height:12px;}

/* ---------- hero ---------- */
.hero{
  padding:clamp(20px,5vw,34px) clamp(16px,5vw,26px) 18px;
  position:relative;
  z-index:2;
  min-width:0;
  text-align:center;
}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(9.5px,2.4vw,11px);
  letter-spacing:.2em;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.eyebrow span{color:var(--magenta);}
.eyebrow::before,
.eyebrow::after{
  content:"◆";
  font-size:6px;
  color:var(--violet-glow);
  opacity:.8;
}

h1{
  font-family:'Chakra Petch',sans-serif;
  font-weight:700;
  font-size:clamp(1.9rem, 9vw, 3.6rem);
  line-height:1.05;
  letter-spacing:.01em;
  word-break:break-word;
  background:linear-gradient(100deg, #fff 0%, var(--violet-glow) 45%, var(--magenta) 90%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:0 0 40px rgba(155,59,255,0.25);
  position:relative;
  z-index:1;
}

.subline{
  margin-top:12px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px 10px;
  font-family:'JetBrains Mono',monospace;
  font-size:12.5px;
  color:var(--muted);
  position:relative;
  z-index:1;
}
.chip{
  border:1px solid var(--line);
  background:rgba(155,59,255,0.07);
  padding:4px 12px;
  clip-path:polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  color:var(--text);
  animation:chipFloat 4.6s ease-in-out infinite;
}
.chip:nth-child(2){animation-delay:.35s;}
.chip:nth-child(3){animation-delay:.7s;}
.chip:nth-child(4){animation-delay:1.05s;}
@keyframes chipFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
}
.chip.accent{
  border-color:rgba(155,59,255,0.55);
  color:var(--violet-glow);
  background:rgba(155,59,255,0.1);
}

  60%,100%{left:110%;}
}

.clockrow{
  margin-top:20px;
  text-align:center;
}
#clock{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(1.5rem,5vw,2rem);
  font-weight:600;
  color:var(--text);
  letter-spacing:.04em;
}
#clockdate{
  margin-top:4px;
  font-family:'JetBrains Mono',monospace;
  font-size:14px;
  font-weight:500;
  color:var(--text);
  letter-spacing:.05em;
}

.signalbars{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:3px;
  margin-top:10px;
  height:14px;
}
.signalbars i{
  width:3px;
  background:var(--violet-glow);
  border-radius:1px;
  opacity:.85;
  animation:barpulse 1.2s ease-in-out infinite;
}
.signalbars i:nth-child(1){height:5px;animation-delay:0s;}
.signalbars i:nth-child(2){height:9px;animation-delay:.15s;background:var(--violet);}
.signalbars i:nth-child(3){height:14px;animation-delay:.3s;background:var(--magenta);}
.signalbars i:nth-child(4){height:8px;animation-delay:.45s;background:var(--violet);}
.signalbars i:nth-child(5){height:11px;animation-delay:.6s;}
@keyframes barpulse{
  0%,100%{transform:scaleY(1);opacity:.85;}
  50%{transform:scaleY(.4);opacity:.5;}
}

/* ---------- schedule body ---------- */
.panel[data-tab-panel="tth"]{
  border-top:1px solid var(--line);
  padding-top:26px;
}
.panel{padding:clamp(16px,4vw,22px) clamp(14px,4vw,20px) clamp(20px,5vw,30px);min-width:0;position:relative;}
.panel::before{
  content:"";
  position:absolute;
  inset:8px 10px;
  z-index:0;
  pointer-events:none;
  opacity:.18;
  background-image:
    linear-gradient(135deg, rgba(155,59,255,.12) 1px, transparent 1px),
    linear-gradient(45deg, rgba(233,53,193,.07) 1px, transparent 1px);
  background-size:34px 34px, 68px 68px;
  -webkit-mask-image:linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
  mask-image:linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
  animation:panelGridShift 16s linear infinite;
}
@keyframes panelGridShift{
  from{background-position:0 0,0 0;}
  to{background-position:68px 34px,-68px 68px;}
}
.daylabel{
  font-family:'Chakra Petch',sans-serif;
  font-size:16px;
  font-weight:600;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--text);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
}
.daylabel::before,
.daylabel::after{
  content:"";
  height:2px;
  flex:1;
  max-width:150px;
  background-size:220% 100%;
  animation:dayLineFlow 4.5s linear infinite;
}
.daylabel::before{
  background-image:linear-gradient(90deg, transparent, var(--line), var(--violet-glow), transparent);
}
.daylabel::after{
  background-image:linear-gradient(90deg, transparent, var(--magenta), var(--line), transparent);
  animation-direction:reverse;
}
@keyframes dayLineFlow{
  from{background-position:0 0;}
  to{background-position:220% 0;}
}

.rows{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.row{
  display:grid;
  grid-template-columns:118px 1fr auto;
  gap:16px;
  align-items:center;
  background:rgba(255,255,255,0.015);
  border:1px solid var(--line);
  border-left:3px solid var(--violet);
  /* GX Opera-inspired opposite slanted corners: top-left + bottom-right */
  clip-path:polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
  padding:14px 16px;
  position:relative;
  transition:transform .2s ease, border-color .2s ease, background .2s ease;
  opacity:0;
  transform:translateY(10px);
  animation:rowIn .5s ease forwards;
  overflow:hidden;
}
.row::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:linear-gradient(110deg, transparent 20%, rgba(185,104,255,.08) 45%, rgba(233,53,193,.10) 50%, transparent 75%);
  transform:translateX(-130%);
  animation:rowSheen 7s ease-in-out infinite;
  animation-delay:inherit;
}
.row::after{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;

<script>
// ---------- data ----------
const MW = [
  {time:["07:30 AM","09:00 AM"], code:"ZGE 1107", name:"Science, Technology, and Society", type:"Lecture", room:"LB 815", start:7.5, end:9},
  {time:["10:30 AM","12:00 PM"], code:"CCS 4101", name:"Modeling and Simulation", type:"Laboratory", room:"LB 905", start:10.5, end:12},
  {time:["12:00 PM","01:00 PM"], code:"CCS 4101", name:"Modeling and Simulation", type:"Lecture", room:"LB 814", start:12, end:13},
  {time:["01:30 PM","03:00 PM"], code:"CNA 1101", name:"Numerical Analysis for ITE", type:"Lecture", room:"LB 812", start:13.5, end:15},
  {time:["03:00 PM","04:30 PM"], code:"ZGE 1109", name:"Life and Works of Rizal", type:"Lecture", room:"LB 814", start:15, end:16.5},
];

const TTH = [
  {time:["07:30 AM","09:00 AM"], code:"CCS 4102", name:"Programming Languages", type:"Laboratory", room:"CS BL A", start:7.5, end:9},
  {time:["10:30 AM","11:30 AM"], code:"CCS 4307", name:"Mobile and Web Development", type:"Lecture", room:"LB 817", start:10.5, end:11.5},
  {time:["12:00 PM","01:30 PM"], code:"CCS 4307", name:"Mobile and Web Development", type:"Laboratory", room:"CS AL B", start:12, end:13.5},
  {time:["01:30 PM","02:30 PM"], code:"CCS 4102", name:"Programming Languages", type:"Lecture", room:"LB 816", start:13.5, end:14.5},
  {time:["04:30 PM","06:00 PM"], code:"CCS 4990", name:"Thesis Writing 2 for CS", type:"Lecture", room:"LB 804", start:16.5, end:18},
];

function renderRows(list, containerId){
  const el = document.getElementById(containerId);
  el.innerHTML = list.map((c, i) => `
      <div class="row" style="animation-delay:${i * 0.06}s">
        <div class="rtime"><b>${c.time[0]}</b>${c.time[1]}</div>
        <div class="rmid">
          <div class="rcode">${c.code}</div>
          <div class="rname">${c.name}</div>
          <div class="rtype">${c.type}</div>
        </div>
        <div class="rroom">${c.room}</div>
      </div>
    `).join('');
}

renderRows(MW, 'rows-mw');
renderRows(TTH, 'rows-tth');

// ---------- clock ----------
function pad(n){ return n.toString().padStart(2,'0'); }
function tick(){
  const d = new Date();
  let h = d.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h === 0) h = 12;
  document.getElementById('clock').textContent = `${pad(h)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${ampm}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clockdate').textContent = `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
tick();
setInterval(tick, 1000);

// ---------- animated background: drifting node network ----------
const canvas = document.getElementById('bgcanvas');
const ctx = canvas.getContext('2d');
let W, H, nodes = [];
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let animationFrameId;

function createNodes(){
  const area = Math.max(1, W * H);
  const isSmallScreen = W < 600;
  const isTablet = W >= 600 && W < 980;

  // Keep the background lively without allowing visual clusters.
  const targetCount = Math.min(
    isSmallScreen ? 58 : (isTablet ? 86 : 116),
    Math.max(isSmallScreen ? 38 : 64, Math.floor(area / (isSmallScreen ? 15500 : 13800)))
  );

  // One dot per jittered grid cell gives even distribution naturally.
  const cellSize = Math.max(
    isSmallScreen ? 46 : 54,
    Math.sqrt(area / targetCount)
  );
  const cols = Math.max(1, Math.ceil(W / cellSize));
  const rows = Math.max(1, Math.ceil(H / cellSize));
  const cells = [];

  for(let row = 0; row < rows; row++){
    for(let col = 0; col < cols; col++){
      cells.push({row,col,sort:Math.random()});
    }
  }
  cells.sort((a,b) => a.sort - b.sort);

  const generated = [];
  const edgePad = isSmallScreen ? 12 : 18;
  const minimumSpacing = cellSize * 0.68;

  for(const cell of cells){
    if(generated.length >= targetCount) break;

    const cellLeft = cell.col * cellSize;
    const cellTop = cell.row * cellSize;
    const jitter = cellSize * 0.22;
    const next = {
      x: Math.min(W - edgePad, Math.max(edgePad, cellLeft + cellSize * 0.5 + (Math.random() - 0.5) * jitter)),
      y: Math.min(H - edgePad, Math.max(edgePad, cellTop + cellSize * 0.5 + (Math.random() - 0.5) * jitter)),
      vx: (Math.random() - 0.5) * (isSmallScreen ? 0.050 : 0.070),
      vy: (Math.random() - 0.5) * (isSmallScreen ? 0.050 : 0.070),
      r: Math.random() * 1.3 + 0.65,
      hue: Math.random() > 0.78 ? 'pink' : 'violet',
      phase: Math.random() * Math.PI * 2
    };

    const hasEnoughSpace = generated.every(node => {
      const dx = node.x - next.x;
      const dy = node.y - next.y;
      return (dx * dx + dy * dy) >= minimumSpacing * minimumSpacing;
    });

    if(hasEnoughSpace) generated.push(next);
  }

  nodes = generated;
}

function handleResize(){
  resize();
  createNodes();
}

window.removeEventListener('resize', resize);
window.addEventListener('resize', handleResize, {passive:true});
createNodes();

function draw(){
  ctx.clearRect(0,0,W,H);

  // Graph-paper grid: fine violet squares with stronger pink major lines.
  const minorGap = W < 600 ? 24 : 30;
  const majorEvery = 5;

  ctx.lineWidth = 1;
  for(let x = 0, index = 0; x <= W; x += minorGap, index++){
    const major = index % majorEvery === 0;
    ctx.strokeStyle = major
      ? 'rgba(239,79,199,0.072)'
      : 'rgba(185,104,255,0.032)';
    ctx.beginPath();
    ctx.moveTo(Math.round(x) + .5,0);
    ctx.lineTo(Math.round(x) + .5,H);
    ctx.stroke();
  }

  for(let y = 0, index = 0; y <= H; y += minorGap, index++){
    const major = index % majorEvery === 0;
    ctx.strokeStyle = major
      ? 'rgba(239,79,199,0.068)'
      : 'rgba(185,104,255,0.030)';
    ctx.beginPath();
    ctx.moveTo(0,Math.round(y) + .5);
    ctx.lineTo(W,Math.round(y) + .5);
    ctx.stroke();
  }

  // Move the nodes before calculating their connections.
  for(const n of nodes){
    if(!reduceMotion){
      n.x += n.vx;
      n.y += n.vy;
      n.phase += 0.011;

      if(n.x < -10) n.x = W + 10;
      if(n.x > W + 10) n.x = -10;
      if(n.y < -10) n.y = H + 10;
      if(n.y > H + 10) n.y = -10;
    }
  }

  // Connect evenly spaced nearby dots without creating dense bundles.
  const linkDistance = W < 600 ? 106 : (W < 980 ? 132 : 148);
  const minimumLinkLength = W < 600 ? 48 : 58;
  const maxDegree = W < 600 ? 1 : 2;
  const degree = new Array(nodes.length).fill(0);
  const links = [];

  for(let i = 0; i < nodes.length; i++){
    const candidates = [];

    for(let j = i + 1; j < nodes.length; j++){
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if(dist >= minimumLinkLength && dist < linkDistance){
        candidates.push({j,dist});
      }
    }

    candidates.sort((a,b) => a.dist - b.dist);

    for(const candidate of candidates){
      if(degree[i] >= maxDegree) break;
      if(degree[candidate.j] >= maxDegree) continue;

      degree[i]++;
      degree[candidate.j]++;
      links.push({i,j:candidate.j,dist:candidate.dist});
    }
  }

  for(const link of links){
    const n = nodes[link.i];
    const m = nodes[link.j];
    const mixPink = n.hue === 'pink' || m.hue === 'pink';
    const alpha = (mixPink ? .105 : .082) * (1 - link.dist / linkDistance);

    ctx.strokeStyle = mixPink
      ? `rgba(239,79,199,${alpha})`
      : `rgba(185,104,255,${alpha})`;
    ctx.lineWidth = 0.75;
    ctx.beginPath();
    ctx.moveTo(n.x,n.y);
    ctx.lineTo(m.x,m.y);
    ctx.stroke();
  }

  // Draw violet/pink nodes and soft halos above the graph-paper grid.
  for(const n of nodes){
    const pulse = reduceMotion ? 1 : 1 + Math.sin(n.phase) * 0.09;
    const radius = n.r * pulse;
    const isPink = n.hue === 'pink';

    ctx.beginPath();
    ctx.arc(n.x,n.y,radius * 3.1,0,Math.PI * 2);
    ctx.fillStyle = isPink
      ? 'rgba(239,79,199,0.040)'
      : 'rgba(185,104,255,0.048)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x,n.y,radius,0,Math.PI * 2);
    ctx.fillStyle = isPink
      ? 'rgba(255,111,217,0.66)'
      : 'rgba(201,132,255,0.70)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x,n.y,radius + 2.1,0,Math.PI * 2);
    ctx.strokeStyle = isPink
      ? 'rgba(255,144,226,0.24)'
      : 'rgba(222,177,255,0.26)';
    ctx.lineWidth = 0.75;
    ctx.stroke();
  }

  if(!reduceMotion) animationFrameId = requestAnimationFrame(draw);
}

draw();
</script>
